<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GSE Health System</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --text: #1a1a1a; --text-secondary: #666;
            --border: #e0e0e0; --ok: #2E7D32; --minor: #E65100; --unsafe: #C62828;
            --accent: #0D47A1; --ramp-clr: #E65100; --tower-clr: #0D47A1;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); max-width: 480px;
            margin: 0 auto; min-height: 100vh; -webkit-tap-highlight-color: transparent;
        }
        /* LOGIN */
        .login-screen {
            display:flex; flex-direction:column; justify-content:center; align-items:center;
            min-height:100vh; padding:20px; background:linear-gradient(160deg,#0D47A1,#01579B,#1A237E);
        }
        .login-card {
            background:#fff; border-radius:20px; padding:32px 24px; width:100%;
            max-width:380px; box-shadow:0 10px 40px rgba(0,0,0,0.4);
        }
        .login-logo { text-align:center; margin-bottom:24px; }
        .login-logo .icon { font-size:50px; }
        .login-logo h1 { font-size:20px; font-weight:800; color:#0D47A1; margin-top:6px; }
        .login-logo p { font-size:11px; color:#999; margin-top:2px; }
        .login-card label { font-size:11px; font-weight:700; color:#555; display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
        .login-card input { width:100%; padding:14px; border:2px solid #e0e0e0; border-radius:12px; font-size:15px; margin-bottom:16px; outline:none; background:#fafafa; }
        .login-card input:focus { border-color:#0D47A1; background:#fff; }
        .role-selector { display:flex; gap:8px; margin-bottom:16px; }
        .role-option { flex:1; padding:16px 8px; border:2px solid #e8e8e8; border-radius:12px; text-align:center; cursor:pointer; transition:all 0.2s; }
        .role-option.selected { border-color:#0D47A1; background:#E3F2FD; }
        .role-option .role-icon { font-size:32px; display:block; }
        .role-option .role-title { font-size:13px; font-weight:700; margin-top:4px; }
        .role-option .role-sub { font-size:10px; color:#999; }
        .login-btn { width:100%; padding:16px; background:#0D47A1; color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; letter-spacing:0.5px; }
        .login-btn:active { background:#0a3570; }
        .login-error { color:#C62828; font-size:12px; text-align:center; margin-top:8px; min-height:18px; }
        .demo-info { font-size:10px; color:#bbb; text-align:center; margin-top:16px; line-height:1.6; }

        /* APP */
        .app { display:none; }
        .header {
            background:#fff; padding:12px 16px; position:sticky; top:0; z-index:100;
            border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;
        }
        .header h1 { font-size:16px; font-weight:700; }
        .user-pill { font-size:10px; padding:4px 10px; border-radius:20px; font-weight:700; color:#fff; text-transform:uppercase; }
        .user-pill.ramp { background:var(--ramp-clr); }
        .user-pill.tower { background:var(--tower-clr); }
        .logout-link { font-size:11px; color:#C62828; background:none; border:none; font-weight:600; cursor-pointer; }

        /* RAMP VIEW */
        .ramp-view { display:none; }
        .ramp-view.active { display:block; }
        .search-bar { padding:10px 14px; background:#fff; display:flex; gap:8px; border-bottom:1px solid #eee; }
        .search-bar input { flex:1; padding:10px 14px; border:1.5px solid #ddd; border-radius:10px; font-size:14px; background:#fafafa; outline:none; }
        .stat-row { display:flex; gap:6px; padding:8px 10px; background:#fff; border-bottom:1px solid #eee; overflow-x:auto; }
        .stat-chip { flex:1; min-width:55px; text-align:center; padding:10px 4px; border-radius:10px; cursor:pointer; border:2px solid transparent; }
        .stat-chip.active { border-color:var(--accent); }
        .stat-chip .num { font-size:22px; font-weight:800; display:block; }
        .stat-chip .lbl { font-size:9px; text-transform:uppercase; color:#888; }
        .stat-chip.all { background:#E3F2FD; } .stat-chip.all .num { color:#0D47A1; }
        .stat-chip.ok { background:#E8F5E9; } .stat-chip.ok .num { color:#2E7D32; }
        .stat-chip.minor { background:#FFF3E0; } .stat-chip.minor .num { color:#E65100; }
        .stat-chip.unsafe { background:#FFEBEE; } .stat-chip.unsafe .num { color:#C62828; }
        .equip-list { padding:4px 10px 90px; background:#fff; min-height:50vh; }
        .equip-item { display:flex; align-items:center; padding:12px 4px; border-bottom:1px solid #f5f5f5; cursor:pointer; gap:10px; }
        .equip-item:active { background:#f9f9f9; }
        .equip-icon { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; font-weight:700; }
        .equip-icon.OK { background:#E8F5E9; color:#2E7D32; } .equip-icon.Minor { background:#FFF3E0; color:#E65100; } .equip-icon.Unsafe { background:#FFEBEE; color:#C62828; }
        .equip-info { flex:1; }
        .equip-name { font-weight:600; font-size:13px; }
        .equip-type { font-size:11px; color:#888; }
        .equip-tail { text-align:right; }
        .equip-status { font-size:10px; font-weight:700; text-transform:uppercase; }
        .equip-status.OK { color:#2E7D32; } .equip-status.Minor { color:#E65100; } .equip-status.Unsafe { color:#C62828; }
        .equip-zone { font-size:9px; color:#aaa; }
        .empty-state { text-align:center; padding:50px 20px; color:#bbb; }
        .pagination { display:flex; justify-content:center; gap:6px; padding:12px; background:#fff; border-top:1px solid #f0f0f0; }
        .page-dot { width:32px; height:32px; border-radius:8px; border:1.5px solid #ddd; background:#fff; font-size:12px; font-weight:600; cursor:pointer; }
        .page-dot.active { background:var(--accent); color:#fff; border-color:var(--accent); }

        /* TOWER VIEW */
        .tower-view { display:none; }
        .tower-view.active { display:block; }
        .tower-tabs { display:flex; background:#fff; border-bottom:2px solid #eee; position:sticky; top:48px; z-index:99; }
        .tower-tab { flex:1; text-align:center; padding:14px 4px; font-size:11px; font-weight:700; border:none; background:none; cursor:pointer; color:#888; border-bottom:3px solid transparent; text-transform:uppercase; }
        .tower-tab.active { color:var(--tower-clr); border-bottom-color:var(--tower-clr); }
        .tower-tab .badge { background:#eee; border-radius:10px; padding:1px 8px; font-size:10px; margin-left:4px; }
        .tower-panel { padding:8px 12px 90px; background:#fff; min-height:50vh; }
        .wo-card { background:#fff; border:1px solid #eee; border-radius:12px; padding:14px; margin-bottom:8px; }
        .wo-header { display:flex; justify-content:space-between; margin-bottom:6px; }
        .wo-id { font-weight:700; font-size:13px; color:var(--tower-clr); }
        .wo-priority { font-size:9px; font-weight:800; padding:3px 8px; border-radius:12px; color:#fff; }
        .wo-priority.Critical { background:#B71C1C; } .wo-priority.High { background:#E65100; } .wo-priority.Medium { background:#F9A825; color:#333; } .wo-priority.Low { background:#558B2F; }
        .wo-asset { font-weight:600; font-size:12px; }
        .wo-crew { background:#FFF3E0; color:#E65100; padding:2px 8px; border-radius:8px; font-size:10px; font-weight:600; }
        .form-group { margin-bottom:12px; }
        .form-group label { font-size:11px; font-weight:700; color:#555; display:block; margin-bottom:4px; text-transform:uppercase; }
        .form-group input,.form-group select,.form-group textarea { width:100%; padding:12px; border:1.5px solid #ddd; border-radius:10px; font-size:14px; background:#fafafa; outline:none; font-family:inherit; }
        .form-group textarea { min-height:70px; resize:vertical; }
        .submit-btn { width:100%; padding:14px; background:var(--tower-clr); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
        .cancel-btn { width:100%; padding:12px; background:#f5f5f5; color:#666; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; margin-top:8px; }

        /* MODAL */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; display:none; align-items:flex-end; }
        .modal-overlay.show { display:flex; }
        .modal { background:#fff; width:100%; max-width:480px; margin:0 auto; border-radius:18px 18px 0 0; padding:8px 0 20px; max-height:88vh; overflow-y:auto; }
        .modal-handle { width:32px; height:5px; background:#ddd; border-radius:3px; margin:0 auto 12px; }
        .modal-header { padding:0 18px 14px; border-bottom:1px solid #eee; }
        .modal-header h2 { font-size:18px; font-weight:700; }
        .modal-body { padding:12px 18px; }
        .detail-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f5f5f5; font-size:13px; }
        .detail-label { color:#888; } .detail-value { font-weight:500; }
        .modal-actions { display:flex; gap:8px; padding:12px 18px; }
        .btn { flex:1; padding:12px 6px; border:2px solid transparent; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; text-align:center; }
        .btn:active { transform:scale(0.96); }
        .btn-ok { background:#E8F5E9; color:#2E7D32; border-color:#2E7D32; } .btn-ok.active { background:#2E7D32; color:#fff; }
        .btn-minor { background:#FFF3E0; color:#E65100; border-color:#E65100; } .btn-minor.active { background:#E65100; color:#fff; }
        .btn-unsafe { background:#FFEBEE; color:#C62828; border-color:#C62828; } .btn-unsafe.active { background:#C62828; color:#fff; }
        .btn-close { width:calc(100% - 36px); margin:4px 18px; padding:12px; background:#f5f5f5; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; color:#666; }
        .btn-repair { background:#E3F2FD; color:#0D47A1; border-color:#0D47A1; width:100%; margin-top:4px; }

        /* QR */
        .qr-fab { position:fixed; bottom:70px; right:14px; width:50px; height:50px; border-radius:50%; background:var(--accent); color:#fff; border:none; font-size:22px; cursor:pointer; box-shadow:0 4px 18px rgba(13,71,161,0.4); z-index:160; display:none; align-items:center; justify-content:center; }
        .scanner-overlay { position:fixed; inset:0; background:#000; z-index:500; display:none; flex-direction:column; }
        .scanner-overlay.show { display:flex; }
        .scanner-header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:#000; color:#fff; }
        .scanner-close { background:rgba(255,255,255,0.2); border:none; color:#fff; width:32px; height:32px; border-radius:50%; font-size:16px; cursor:pointer; }
        .scanner-container { flex:1; position:relative; overflow:hidden; }
        #qr-reader { width:100%; height:100%; }
        .scanner-frame { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:200px; height:200px; border:3px solid #2196F3; border-radius:16px; box-shadow:0 0 0 2000px rgba(0,0,0,0.5); pointer-events:none; z-index:2; }
        .scanner-footer { padding:14px; background:#000; color:#fff; text-align:center; }
        .scanner-manual-btn { width:100%; padding:12px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); border-radius:8px; color:#fff; font-size:13px; font-weight:600; cursor:pointer; }
        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 18px; border-radius:20px; font-size:12px; font-weight:600; z-index:700; pointer-events:none; white-space:nowrap; }
    </style>
</head>
<body>

<!-- ======== LOGIN SCREEN ======== -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🛫</span>
      <h1>GSE Health System</h1>
      <p>Ground Support Equipment Management</p>
    </div>
    
    <label>Select Role</label>
    <div class="role-selector" id="roleSelector">
      <div class="role-option selected" data-role="ramp">
        <span class="role-icon">👷</span>
        <span class="role-title">Ramp Agent</span>
        <span class="role-sub">Inspection & Status</span>
      </div>
      <div class="role-option" data-role="tower">
        <span class="role-icon">🗼</span>
        <span class="role-title">Ramp Controller</span>
        <span class="role-sub">Oversight & Repairs</span>
      </div>
    </div>
    
    <label>User ID</label>
    <input type="text" id="userId" placeholder="RA-101 or RTC-001" autocomplete="off">
    
    <label>PIN</label>
    <input type="password" id="userPin" placeholder="••••" maxlength="6" autocomplete="off">
    
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
    
    <div class="demo-info">
      👷 Ramp Agent: <b>RA-101</b> / <b>1234</b><br>
      🗼 Controller: <b>RTC-001</b> / <b>5678</b>
    </div>
  </div>
</div>

<!-- ======== MAIN APP ======== -->
<div class="app" id="appContainer">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px;">
      <h1>🛫 GSE Health</h1>
      <span class="user-pill" id="userBadge">RAMP</span>
    </div>
    <button class="logout-link" id="logoutBtn">Logout</button>
  </div>

  <!-- RAMP AGENT VIEW -->
  <div class="ramp-view active" id="rampView">
    <div class="search-bar">
      <input type="text" id="rampSearch" placeholder="🔍 Search assets...">
    </div>
    <div class="stat-row" id="rampStats">
      <div class="stat-chip all active" data-tab="all"><span class="num" id="sAll">0</span><span class="lbl">ALL</span></div>
      <div class="stat-chip ok" data-tab="OK"><span class="num" id="sOk">0</span><span class="lbl">OK</span></div>
      <div class="stat-chip minor" data-tab="Minor"><span class="num" id="sMinor">0</span><span class="lbl">Minor</span></div>
      <div class="stat-chip unsafe" data-tab="Unsafe"><span class="num" id="sUnsafe">0</span><span class="lbl">Unsafe</span></div>
    </div>
    <div class="equip-list" id="rampList"></div>
    <div class="pagination" id="rampPagination"></div>
  </div>

  <!-- TOWER CONTROLLER VIEW -->
  <div class="tower-view" id="towerView">
    <div class="tower-tabs" id="towerTabs">
      <button class="tower-tab active" data-panel="overview">📊 Overview</button>
      <button class="tower-tab" data-panel="unsafe">🔴 Unsafe<span class="badge" id="tbUnsafe">0</span></button>
      <button class="tower-tab" data-panel="workorders">🔧 Work Orders<span class="badge" id="tbWO">0</span></button>
      <button class="tower-tab" data-panel="create">➕ New Order</button>
    </div>
    <div class="tower-panel" id="towerPanel"></div>
  </div>
</div>

<button class="qr-fab" id="qrFab">📷</button>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<!-- SCANNER -->
<div class="scanner-overlay" id="scannerOverlay">
  <div class="scanner-header"><h3>📷 Scan QR Code</h3><button class="scanner-close" id="scannerClose">✕</button></div>
  <div class="scanner-container"><div id="qr-reader"></div><div class="scanner-frame"></div></div>
  <div class="scanner-footer"><button class="scanner-manual-btn" id="scannerManual">⌨️ Enter ID Manually</button></div>
</div>

<div id="toastContainer"></div>

<script>
// ========== SIMPLE AUTH SYSTEM ==========
const USERS = {
  'RA-101': { pin: '1234', role: 'ramp', name: 'Marcus "Apex" Williams' },
  'RA-102': { pin: '1234', role: 'ramp', name: 'Luis "Ghost" Rodriguez' },
  'RTC-001': { pin: '5678', role: 'tower', name: 'Sarah "Eagle" Mitchell' },
  'RTC-002': { pin: '5678', role: 'tower', name: 'David "Sentinel" Chen' }
};

// ========== STATE ==========
let currentUser = null;
let allAssets = [];
let workOrders = [];
let currentTab = 'all';
let searchQuery = '';
let currentPage = 1;
let towerPanel = 'overview';
let currentAssetId = null;
let html5QrCode = null;
let scannerActive = false;
const PAGE_SIZE = 20;

// ========== GENERATE FALLBACK DATA ==========
function generateAssets() {
  const types = ['Baggage Cart','Belt Loader','GPU','Cargo Loader','Stairs','Cargo Dolly','Chock Set','Air Start Unit','De-ice Truck','Lav Truck','Catering Truck','Fuel Bowser','Towbar'];
  const zones = ['Terminal A','Terminal B','Terminal C','Cargo North','Cargo South','Remote R1','Remote R2'];
  const statuses = ['OK','OK','OK','OK','OK','Minor','Minor','Unsafe'];
  const assets = [];
  for(let i=1; i<=50; i++) {
    const t = types[Math.floor(Math.random()*types.length)];
    const prefix = t.replace(/[^A-Z]/g,'').substring(0,4).toUpperCase();
    const id = prefix + '-' + String(i).padStart(3,'0');
    const s = statuses[Math.floor(Math.random()*statuses.length)];
    assets.push({
      id: id, type: t, status: s,
      lastUpdated: '2026-04-23 ' + (8+Math.floor(Math.random()*14)) + ':' + String(Math.floor(Math.random()*60)).padStart(2,'0'),
      issueCount: s==='OK'?0:s==='Minor'?1+Math.floor(Math.random()*3):3+Math.floor(Math.random()*8),
      location: zones[Math.floor(Math.random()*zones.length)],
      notes: s==='OK'?'':s==='Minor'?'Minor wear detected':'Requires immediate repair',
    });
  }
  return assets;
}

// ========== LOGIN ==========
document.querySelectorAll('.role-option').forEach(el => {
  el.addEventListener('click', function() {
    document.querySelectorAll('.role-option').forEach(x => x.classList.remove('selected'));
    this.classList.add('selected');
  });
});

document.getElementById('loginBtn').addEventListener('click', function() {
  const userId = document.getElementById('userId').value.trim().toUpperCase();
  const pin = document.getElementById('userPin').value.trim();
  const selectedRole = document.querySelector('.role-option.selected').dataset.role;
  const errorEl = document.getElementById('loginError');
  
  errorEl.textContent = '';
  
  if (!userId) { errorEl.textContent = 'Enter User ID'; return; }
  if (!pin) { errorEl.textContent = 'Enter PIN'; return; }
  
  const user = USERS[userId];
  
  if (!user) {
    errorEl.textContent = 'User ID not found';
    return;
  }
  
  if (user.pin !== pin) {
    errorEl.textContent = 'Incorrect PIN';
    return;
  }
  
  if (user.role !== selectedRole) {
    errorEl.textContent = 'Wrong role selected for this user';
    return;
  }
  
  // SUCCESS
  currentUser = user;
  localStorage.setItem('gse_current_user', JSON.stringify(user));
  showApp();
});

// Check for saved login
const savedUser = localStorage.getItem('gse_current_user');
if (savedUser) {
  currentUser = JSON.parse(savedUser);
  showApp();
}

function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  document.getElementById('qrFab').style.display = 'flex';
  
  const badge = document.getElementById('userBadge');
  badge.textContent = currentUser.role === 'ramp' ? 'RAMP AGENT' : 'TOWER CTRL';
  badge.className = 'user-pill ' + currentUser.role;
  
  if (currentUser.role === 'ramp') {
    document.getElementById('rampView').classList.add('active');
    document.getElementById('towerView').classList.remove('active');
  } else {
    document.getElementById('rampView').classList.remove('active');
    document.getElementById('towerView').classList.add('active');
  }
  
  initApp();
}

// ========== LOGOUT ==========
document.getElementById('logoutBtn').addEventListener('click', function() {
  localStorage.removeItem('gse_current_user');
  location.reload();
});

// ========== INIT APP ==========
function initApp() {
  // Load assets
  const cached = localStorage.getItem('gse_assets');
  if (cached) {
    allAssets = JSON.parse(cached);
  } else {
    allAssets = generateAssets();
    localStorage.setItem('gse_assets', JSON.stringify(allAssets));
  }
  
  // Load work orders
  const cachedWO = localStorage.getItem('gse_workorders');
  if (cachedWO) {
    workOrders = JSON.parse(cachedWO);
  }
  
  if (currentUser.role === 'ramp') {
    renderRampList();
    updateRampStats();
  } else {
    renderTowerPanel();
  }
}

// ========== RAMP FUNCTIONS ==========
function getFilteredAssets() {
  let f = allAssets.slice();
  if (currentTab !== 'all') f = f.filter(a => a.status === currentTab);
  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    f = f.filter(a => a.id.toLowerCase().includes(q) || a.type.toLowerCase().includes(q) || a.location.toLowerCase().includes(q));
  }
  return f;
}

function renderRampList() {
  const filtered = getFilteredAssets();
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);
  const el = document.getElementById('rampList');
  
  if (page.length === 0) {
    el.innerHTML = '<div class="empty-state"><p>No equipment found</p></div>';
  } else {
    el.innerHTML = page.map(a => `
      <div class="equip-item" data-id="${a.id}">
        <div class="equip-icon ${a.status}">${a.status==='OK'?'✓':a.status==='Minor'?'!':'✕'}</div>
        <div class="equip-info"><div class="equip-name">${a.id}</div><div class="equip-type">${a.type}</div></div>
        <div class="equip-tail"><div class="equip-status ${a.status}">${a.status}</div><div class="equip-zone">📍${a.location}</div></div>
      </div>
    `).join('');
  }
  
  document.querySelectorAll('.equip-item').forEach(el => {
    el.addEventListener('click', function() { openAssetModal(this.dataset.id); });
  });
  
  renderRampPagination(filtered.length);
}

function renderRampPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById('rampPagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  let h = '';
  for (let i = 1; i <= pages; i++) {
    h += `<button class="page-dot${i===currentPage?' active':''}" data-p="${i}">${i}</button>`;
  }
  pag.innerHTML = h;
  pag.querySelectorAll('.page-dot').forEach(b => {
    b.addEventListener('click', function() {
      currentPage = parseInt(this.dataset.p);
      renderRampList();
      window.scrollTo(0, 200);
    });
  });
}

function updateRampStats() {
  document.getElementById('sAll').textContent = allAssets.length;
  document.getElementById('sOk').textContent = allAssets.filter(a => a.status === 'OK').length;
  document.getElementById('sMinor').textContent = allAssets.filter(a => a.status === 'Minor').length;
  document.getElementById('sUnsafe').textContent = allAssets.filter(a => a.status === 'Unsafe').length;
}

// ========== MODAL ==========
function openAssetModal(assetId) {
  const a = allAssets.find(x => x.id === assetId);
  if (!a) return;
  currentAssetId = assetId;
  
  let html = `
    <div class="modal-handle"></div>
    <div class="modal-header"><h2>${a.id}</h2><span style="font-size:12px;color:#888;">${a.type}</span></div>
    <div class="modal-body">
      <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" style="font-weight:700;color:${a.status==='OK'?'#2E7D32':a.status==='Minor'?'#E65100':'#C62828'}">${a.status}</span></div>
      <div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">${a.location}</span></div>
      <div class="detail-row"><span class="detail-label">Last Updated</span><span class="detail-value">${a.lastUpdated}</span></div>
      <div class="detail-row"><span class="detail-label">Issue Count</span><span class="detail-value">${a.issueCount}</span></div>
      ${a.notes ? `<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-value">${a.notes}</span></div>` : ''}
    </div>
    <div class="modal-actions">
      <button class="btn btn-ok${a.status==='OK'?' active':''}" onclick="window._updateStatus('OK')">✓ OK</button>
      <button class="btn btn-minor${a.status==='Minor'?' active':''}" onclick="window._updateStatus('Minor')">⚠ Minor</button>
      <button class="btn btn-unsafe${a.status==='Unsafe'?' active':''}" onclick="window._updateStatus('Unsafe')">✕ Unsafe</button>
    </div>
  `;
  
  // Tower gets extra "Create Work Order" button
  if (currentUser.role === 'tower' && a.status !== 'OK') {
    html += `<button class="btn btn-repair" onclick="window._createWorkOrder()">🔧 Create Work Order</button>`;
  }
  
  html += `<button class="btn-close" onclick="closeModal()">Close</button>`;
  
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

window._updateStatus = function(newStatus) {
  if (!currentAssetId) return;
  const a = allAssets.find(x => x.id === currentAssetId);
  if (!a) return;
  a.status = newStatus;
  a.lastUpdated = new Date().toISOString().replace('T',' ').substring(0,16);
  a.issueCount = newStatus === 'Unsafe' ? (a.issueCount||0)+1 : newStatus === 'Minor' ? Math.max(1,(a.issueCount||0)) : (a.issueCount||0);
  localStorage.setItem('gse_assets', JSON.stringify(allAssets));
  if (currentUser.role === 'ramp') { renderRampList(); updateRampStats(); }
  else { renderTowerPanel(); }
  openAssetModal(currentAssetId);
  showToast('✅ ' + currentAssetId + ' → ' + newStatus);
};

window._createWorkOrder = function() {
  closeModal();
  document.querySelectorAll('.tower-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tower-tab[data-panel="create"]').classList.add('active');
  towerPanel = 'create';
  renderTowerPanel();
};

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  currentAssetId = null;
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
