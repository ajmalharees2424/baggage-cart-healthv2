<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GSE Health System</title>
    <style>
        :root {
            --bg: #f0f2f5; --text: #1a1a1a;
            --ok: #2E7D32; --minor: #E65100; --unsafe: #C62828; --accent: #0D47A1;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:var(--bg); color:var(--text); max-width:480px; margin:0 auto; min-height:100vh; }
        /* Login */
        .login-screen { display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; padding:20px; background:linear-gradient(160deg,#0D47A1,#01579B,#1A237E); }
        .login-card { background:#fff; border-radius:20px; padding:30px 20px; width:100%; max-width:360px; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
        .login-card h1 { text-align:center; font-size:20px; font-weight:800; color:#0D47A1; margin-bottom:4px; }
        .login-card p { text-align:center; font-size:11px; color:#999; margin-bottom:20px; }
        .role-selector { display:flex; gap:8px; margin-bottom:16px; }
        .role-option { flex:1; padding:14px 4px; border:2px solid #e0e0e0; border-radius:10px; text-align:center; cursor:pointer; transition:0.2s; }
        .role-option.selected { border-color:#0D47A1; background:#E3F2FD; }
        .role-option .icon { font-size:28px; display:block; } .role-option .title { font-size:12px; font-weight:700; } .role-option .sub { font-size:9px; color:#999; }
        .login-card label { font-size:11px; font-weight:700; color:#555; display:block; margin-bottom:4px; text-transform:uppercase; }
        .login-card input { width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:10px; font-size:15px; margin-bottom:14px; outline:none; background:#fafafa; }
        .login-card input:focus { border-color:#0D47A1; }
        .login-btn { width:100%; padding:14px; background:#0D47A1; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }
        .login-error { color:#C62828; font-size:12px; text-align:center; margin-top:8px; min-height:18px; }
        .demo-info { font-size:10px; color:#bbb; text-align:center; margin-top:14px; line-height:1.6; }
        /* App */
        .app { display:none; }
        .header { background:#fff; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; }
        .header h1 { font-size:16px; }
        .user-pill { font-size:10px; padding:4px 10px; border-radius:20px; font-weight:700; color:#fff; }
        .user-pill.ramp { background:var(--minor); } .user-pill.tower { background:var(--accent); }
        .logout-link { color:#C62828; font-weight:600; background:none; border:none; cursor:pointer; font-size:12px; }
        .view { display:none; padding:0 0 80px; }
        .view.active { display:block; }
        .equip-list { padding:8px 12px; background:#fff; }
        .equip-item { display:flex; align-items:center; padding:10px 0; border-bottom:1px solid #f0f0f0; gap:10px; cursor:pointer; }
        .equip-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; }
        .equip-icon.OK { background:#E8F5E9; color:#2E7D32; } .equip-icon.Minor { background:#FFF3E0; color:#E65100; } .equip-icon.Unsafe { background:#FFEBEE; color:#C62828; }
        .equip-info { flex:1; } .equip-name { font-weight:600; font-size:13px; } .equip-type { font-size:11px; color:#888; }
        .equip-status { font-size:10px; font-weight:700; text-transform:uppercase; }
        .empty-state { text-align:center; padding:40px; color:#bbb; }
        .stat-row { display:flex; gap:4px; padding:8px 10px; background:#fff; border-bottom:1px solid #eee; }
        .stat-chip { flex:1; text-align:center; padding:8px 2px; border-radius:8px; cursor:pointer; border:2px solid transparent; }
        .stat-chip.active { border-color:var(--accent); }
        .stat-chip .num { font-size:20px; font-weight:800; display:block; }
        .stat-chip .lbl { font-size:9px; color:#888; }
        .stat-chip.all { background:#E3F2FD; } .stat-chip.all .num { color:#0D47A1; }
        .stat-chip.ok { background:#E8F5E9; } .stat-chip.ok .num { color:#2E7D32; }
        .stat-chip.minor { background:#FFF3E0; } .stat-chip.minor .num { color:#E65100; }
        .stat-chip.unsafe { background:#FFEBEE; } .stat-chip.unsafe .num { color:#C62828; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; display:none; align-items:flex-end; }
        .modal-overlay.show { display:flex; }
        .modal { background:#fff; width:100%; border-radius:16px 16px 0 0; padding:20px; max-height:80vh; overflow-y:auto; }
        .btn { display:block; width:100%; padding:12px; border-radius:8px; font-weight:700; margin-top:8px; cursor:pointer; border:none; }
        .btn-ok { background:#E8F5E9; color:#2E7D32; border:1px solid #2E7D32; } .btn-ok.active { background:#2E7D32; color:#fff; }
        .btn-minor { background:#FFF3E0; color:#E65100; border:1px solid #E65100; } .btn-minor.active { background:#E65100; color:#fff; }
        .btn-unsafe { background:#FFEBEE; color:#C62828; border:1px solid #C62828; } .btn-unsafe.active { background:#C62828; color:#fff; }
        .toast { position:fixed; top:16px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 18px; border-radius:20px; font-size:12px; z-index:700; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>🛫 GSE Health System</h1>
    <p>Ground Support Equipment Management</p>
    
    <label>Select Role</label>
    <div class="role-selector" id="roleSelector">
      <div class="role-option selected" data-role="ramp"><span class="icon">👷</span><span class="title">Ramp Agent</span><span class="sub">Inspection & Status</span></div>
      <div class="role-option" data-role="tower"><span class="icon">🗼</span><span class="title">Ramp Controller</span><span class="sub">Oversight & Repairs</span></div>
    </div>
    
    <label>User ID</label>
    <input type="text" id="userId" placeholder="RA-101 or RTC-001" autocomplete="off">
    
    <label>PIN</label>
    <input type="password" id="userPin" placeholder="••••" maxlength="6" autocomplete="off">
    
    <button class="login-btn" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
    
    <div class="demo-info">👷 RA-101 / 1234<br>🗼 RTC-001 / 5678</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appContainer">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px;"><h1>🛫 GSE</h1><span class="user-pill" id="userBadge"></span></div>
    <button class="logout-link" id="logoutBtn">Logout</button>
  </div>
  
  <!-- RAMP VIEW -->
  <div class="view active" id="rampView">
    <div class="stat-row" id="rampStats">
      <div class="stat-chip all active" data-tab="all"><span class="num" id="sAll">0</span><span class="lbl">ALL</span></div>
      <div class="stat-chip ok" data-tab="OK"><span class="num" id="sOk">0</span><span class="lbl">OK</span></div>
      <div class="stat-chip minor" data-tab="Minor"><span class="num" id="sMinor">0</span><span class="lbl">Minor</span></div>
      <div class="stat-chip unsafe" data-tab="Unsafe"><span class="num" id="sUnsafe">0</span><span class="lbl">Unsafe</span></div>
    </div>
    <div class="equip-list" id="rampList"></div>
  </div>
  
  <!-- TOWER VIEW -->
  <div class="view" id="towerView">
    <div style="padding:16px; background:#fff;">
      <h3>Tower Controller Dashboard</h3>
      <p style="color:#888; font-size:13px;">Manage work orders and oversee fleet status.</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div id="toastContainer"></div>

<script>
// ========== USER DATABASE ==========
const USERS = {
  'RA-101': { pin: '1234', role: 'ramp', name: 'Marcus "Apex" Williams' },
  'RA-102': { pin: '1234', role: 'ramp', name: 'Luis "Ghost" Rodriguez' },
  'RTC-001': { pin: '5678', role: 'tower', name: 'Sarah "Eagle" Mitchell' },
  'RTC-002': { pin: '5678', role: 'tower', name: 'David "Sentinel" Chen' }
};

let currentUser = null;
let allAssets = [];
let currentTab = 'all';

// ========== DEMO ASSETS ==========
function generateAssets() {
  const types = ['Baggage Cart','Belt Loader','GPU','Cargo Loader','Stairs','Cargo Dolly','Chock Set','Air Start','De-ice Truck','Lav Truck'];
  const zones = ['Terminal A','Terminal B','Terminal C','Cargo North','Cargo South','Remote R1','Remote R2'];
  const statuses = ['OK','OK','OK','OK','OK','Minor','Minor','Unsafe'];
  const arr = [];
  for (let i=1; i<=30; i++) {
    const t = types[Math.floor(Math.random()*types.length)];
    const prefix = t.replace(/[^A-Z]/g,'').substring(0,4).toUpperCase();
    const id = prefix + '-' + String(i).padStart(3,'0');
    const s = statuses[Math.floor(Math.random()*statuses.length)];
    arr.push({
      id, type:t, status:s,
      lastUpdated: '2026-04-24 0' + Math.floor(Math.random()*9) + ':00',
      issueCount: s==='OK'?0:s==='Minor'?1+Math.floor(Math.random()*3):3+Math.floor(Math.random()*5),
      location: zones[Math.floor(Math.random()*zones.length)],
      notes: s==='OK'?'':(s==='Minor'?'Minor wear detected':'Critical repair needed')
    });
  }
  return arr;
}

// ========== LOGIN LOGIC ==========
document.querySelectorAll('.role-option').forEach(opt => {
  opt.addEventListener('click', function() {
    document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
    this.classList.add('selected');
  });
});

document.getElementById('loginBtn').addEventListener('click', function() {
  const userId = document.getElementById('userId').value.trim().toUpperCase();
  const pin = document.getElementById('userPin').value.trim();
  const selectedRole = document.querySelector('.role-option.selected')?.dataset.role;
  const errorEl = document.getElementById('loginError');
  
  errorEl.textContent = '';
  if (!userId) { errorEl.textContent = 'Enter your User ID'; return; }
  if (!pin) { errorEl.textContent = 'Enter your PIN'; return; }
  
  const user = USERS[userId];
  if (!user) {
    errorEl.textContent = 'User ID not found. Try RA-101 or RTC-001.';
    return;
  }
  if (user.pin !== pin) {
    errorEl.textContent = 'Incorrect PIN.';
    return;
  }
  if (user.role !== selectedRole) {
    errorEl.textContent = 'Wrong role selected for this user.';
    return;
  }
  
  // SUCCESS
  currentUser = user;
  localStorage.setItem('gse_user', JSON.stringify(user));
  enterApp();
});

// Auto-login if saved
(function() {
  const saved = localStorage.getItem('gse_user');
  if (saved) {
    try {
      const u = JSON.parse(saved);
      if (USERS[u.badge] || USERS[u.name] || USERS[Object.keys(USERS).find(k=>USERS[k].name===u.name)]) {
        // Reconstruct user from saved data
        const key = Object.keys(USERS).find(k => USERS[k].name === u.name);
        if (key) {
          currentUser = USERS[key];
          enterApp();
          return;
        }
      }
    } catch(e) {}
  }
})();

function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appContainer').style.display = 'block';
  
  const badge = document.getElementById('userBadge');
  badge.textContent = currentUser.role === 'ramp' ? 'RAMP AGENT' : 'TOWER CTRL';
  badge.className = 'user-pill ' + currentUser.role;
  
  // Load assets
  const cached = localStorage.getItem('gse_assets');
  allAssets = cached ? JSON.parse(cached) : generateAssets();
  if (!cached) localStorage.setItem('gse_assets', JSON.stringify(allAssets));
  
  // Show correct view
  document.getElementById('rampView').classList.toggle('active', currentUser.role === 'ramp');
  document.getElementById('towerView').classList.toggle('active', currentUser.role === 'tower');
  
  if (currentUser.role === 'ramp') {
    renderRampList();
    setupRampListeners();
  }
}

// ========== RAMP DASHBOARD ==========
function renderRampList() {
  let filtered = allAssets.slice();
  if (currentTab !== 'all') filtered = filtered.filter(a => a.status === currentTab);
  
  const el = document.getElementById('rampList');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No equipment found</div>';
    return;
  }
  el.innerHTML = filtered.map(a => `
    <div class="equip-item" data-id="${a.id}">
      <div class="equip-icon ${a.status}">${a.status==='OK'?'✓':a.status==='Minor'?'!':'✕'}</div>
      <div class="equip-info"><div class="equip-name">${a.id}</div><div class="equip-type">${a.type}</div></div>
      <div class="equip-status ${a.status}">${a.status}</div>
    </div>
  `).join('');
  
  document.querySelectorAll('.equip-item').forEach(item => {
    item.addEventListener('click', function() { openAssetModal(this.dataset.id); });
  });
  
  updateStats();
}

function updateStats() {
  document.getElementById('sAll').textContent = allAssets.length;
  document.getElementById('sOk').textContent = allAssets.filter(a => a.status === 'OK').length;
  document.getElementById('sMinor').textContent = allAssets.filter(a => a.status === 'Minor').length;
  document.getElementById('sUnsafe').textContent = allAssets.filter(a => a.status === 'Unsafe').length;
}

function setupRampListeners() {
  document.getElementById('rampStats').addEventListener('click', function(e) {
    const chip = e.target.closest('.stat-chip');
    if (!chip) return;
    currentTab = chip.dataset.tab;
    document.querySelectorAll('.stat-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    renderRampList();
  });
}

// ========== MODAL ==========
function openAssetModal(assetId) {
  const a = allAssets.find(x => x.id === assetId);
  if (!a) return;
  
  const html = `
    <h3>${a.id}</h3><p style="color:#888;font-size:13px;">${a.type} · ${a.location}</p>
    <div style="margin:12px 0;">Status: <strong>${a.status}</strong></div>
    <button class="btn btn-ok ${a.status==='OK'?'active':''}" onclick="window._updateStatus('${a.id}','OK')">✓ Mark OK</button>
    <button class="btn btn-minor ${a.status==='Minor'?'active':''}" onclick="window._updateStatus('${a.id}','Minor')">⚠ Mark Minor</button>
    <button class="btn btn-unsafe ${a.status==='Unsafe'?'active':''}" onclick="window._updateStatus('${a.id}','Unsafe')">✕ Mark Unsafe</button>
    <button class="btn" style="background:#f5f5f5;color:#333;" onclick="document.getElementById('modalOverlay').classList.remove('show')">Close</button>
  `;
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

window._updateStatus = function(assetId, newStatus) {
  const a = allAssets.find(x => x.id === assetId);
  if (!a) return;
  a.status = newStatus;
  a.lastUpdated = new Date().toISOString().replace('T',' ').substring(0,16);
  localStorage.setItem('gse_assets', JSON.stringify(allAssets));
  renderRampList();
  openAssetModal(assetId);
  showToast('✅ Updated to ' + newStatus);
};

// ========== TOAST ==========
function showToast(msg) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ========== LOGOUT ==========
document.getElementById('logoutBtn').addEventListener('click', function() {
  localStorage.removeItem('gse_user');
  location.reload();
});

// Close modal by clicking backdrop
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('show');
});
</script>
</body>
</html>
