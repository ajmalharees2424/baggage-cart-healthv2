<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroLoad 3D - B747 Cargo Optimizer</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --accent: #007bff;
            --text: #e0e0e0;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; display: flex; }
        
        /* UI Panel */
        #ui-panel { width: 350px; height: 100vh; background: var(--panel); border-right: 1px solid #333; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 10; }
        h2 { margin-top: 0; color: var(--accent); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { margin-bottom: 15px; background: #2a2a2a; padding: 10px; border-radius: 4px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: #aaa; }
        input { width: 80px; background: #333; border: 1px solid #444; color: white; padding: 5px; border-radius: 3px; }
        button { cursor: pointer; background: var(--accent); color: white; border: none; padding: 10px 15px; border-radius: 4px; width: 100%; font-weight: bold; margin-top: 10px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        
        /* Stats Display */
        #stats { margin-top: 20px; font-family: monospace; font-size: 0.9rem; background: #000; padding: 15px; border-radius: 5px; border-left: 3px solid var(--accent); }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .warning { color: #ff4d4d; font-weight: bold; }

        /* Canvas */
        #viewport { flex-grow: 1; height: 100vh; position: relative; }
        .label-3d { position: absolute; bottom: 10px; right: 10px; color: #666; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>AeroLoad B747-400F</h2>
    <div class="input-group">
        <label>Cargo Type A (L x W x H - Weight)</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="l1" value="3.1">
            <input type="number" id="w1" value="2.4">
            <input type="number" id="h1" value="2.4">
        </div>
        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <input type="number" id="wt1" value="2500" title="Weight (kg)">
            <input type="number" id="q1" value="12" title="Quantity">
        </div>
    </div>

    <div class="input-group">
        <label>Cargo Type B (Heavy/Small)</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="l2" value="1.2">
            <input type="number" id="w2" value="1.2">
            <input type="number" id="h2" value="1.0">
        </div>
        <div style="display: flex; gap: 5px; margin-top: 5px;">
            <input type="number" id="wt2" value="4000" title="Weight (kg)">
            <input type="number" id="q2" value="8" title="Quantity">
        </div>
    </div>

    <button onclick="runOptimization()">Optimize Loading</button>

    <div id="stats">
        <div class="stat-line"><span>Volume Utilization:</span> <span id="stat-vol">0%</span></div>
        <div class="stat-line"><span>Total Mass:</span> <span id="stat-mass">0 kg</span></div>
        <div class="stat-line"><span>LCG (from nose):</span> <span id="stat-cog">0.0m</span></div>
        <div id="cog-warning" class="warning" style="display:none;">⚠️ COG OUT OF BOUNDS</div>
    </div>
    
    <div style="margin-top: 20px; font-size: 0.8rem; color: #888;">
        Controls: Left Click (Rotate), Right Click (Pan), Scroll (Zoom)
    </div>
</div>

<div id="viewport"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // AIRCRAFT DIMENSIONS (B747-400F Main Deck Approx)
    const HOLD = {
        length: 48,  // meters
        width: 4.8,  // meters
        height: 3.0, // meters
        maxPayload: 112000 // kg
    };

    let scene, camera, renderer, controls, holdWireframe;
    let cargoMeshes = [];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x121212);

        camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
        camera.position.set(40, 30, 60);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        
        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Create Cargo Hold Visual
        const geometry = new THREE.BoxGeometry(HOLD.width, HOLD.height, HOLD.length);
        const edges = new THREE.EdgesGeometry(geometry);
        holdWireframe = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x444444 }));
        // Center the hold floor at Y=0
        holdWireframe.position.set(0, HOLD.height / 2, 0);
        scene.add(holdWireframe);

        // Floor Grid
        const grid = new THREE.GridHelper(100, 20, 0x333333, 0x222222);
        scene.add(grid);

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // PACKING LOGIC
    window.runOptimization = function() {
        // Clear previous
        cargoMeshes.forEach(m => scene.remove(m));
        cargoMeshes = [];

        const cargoItems = [
            { l: parseFloat(l1.value), w: parseFloat(w1.value), h: parseFloat(h1.value), wt: parseFloat(wt1.value), q: parseInt(q1.value), color: 0x007bff },
            { l: parseFloat(l2.value), w: parseFloat(w2.value), h: parseFloat(h2.value), wt: parseFloat(wt2.value), q: parseInt(q2.value), color: 0xffaa00 }
        ];

        // Flatten list and sort by volume (descending)
        let flatItems = [];
        cargoItems.forEach(group => {
            for(let i=0; i < group.q; i++) {
                flatItems.push({...group, vol: group.l * group.w * group.h});
            }
        });
        flatItems.sort((a, b) => b.vol - a.vol);

        let currentX = -HOLD.width/2;
        let currentZ = -HOLD.length/2;
        let shelfMaxHeight = 0;
        let rowMaxDepth = 0;
        
        let totalWeight = 0;
        let weightedZSum = 0;
        let totalVolUsed = 0;

        flatItems.forEach(item => {
            // Check if item fits in current row (X)
            if (currentX + item.w > HOLD.width/2) {
                currentX = -HOLD.width/2;
                currentZ += rowMaxDepth;
                rowMaxDepth = 0;
            }

            // Check if item fits in length (Z)
            if (currentZ + item.l <= HOLD.length/2) {
                // Place Item Mesh
                const mesh = createBox(item.w, item.h, item.l, item.color);
                
                // Position (Three.js uses center points)
                const posX = currentX + item.w/2;
                const posY = item.h/2;
                const posZ = currentZ + item.l/2;
                
                mesh.position.set(posX, posY, posZ);
                scene.add(mesh);
                cargoMeshes.push(mesh);

                // Stats calc
                totalWeight += item.wt;
                weightedZSum += (item.wt * posZ);
                totalVolUsed += item.vol;

                // Move cursor
                currentX += item.w;
                rowMaxDepth = Math.max(rowMaxDepth, item.l);
            }
        });

        updateStats(totalWeight, weightedZSum, totalVolUsed);
    };

    function createBox(w, h, l, color) {
        const geo = new THREE.BoxGeometry(w, h, l);
        const mat = new THREE.MeshStandardMaterial({ 
            color: color, 
            transparent: true, 
            opacity: 0.9,
            roughness: 0.7
        });
        return new THREE.Mesh(geo, mat);
    }

    function updateStats(weight, wZSum, vol) {
        const volCapacity = HOLD.length * HOLD.width * HOLD.height;
        const volPct = ((vol / volCapacity) * 100).toFixed(1);
        const cogZ = weight > 0 ? (wZSum / weight).toFixed(2) : 0;
        
        document.getElementById('stat-vol').innerText = `${volPct}%`;
        document.getElementById('stat-mass').innerText = `${weight.toLocaleString()} kg`;
        document.getElementById('stat-cog').innerText = `${cogZ}m (offset)`;

        // B747 safe CoG is usually ±5m from the center point of the hold
        const cogWarning = document.getElementById('cog-warning');
        if (Math.abs(cogZ) > 5) {
            cogWarning.style.display = 'block';
        } else {
            cogWarning.style.display = 'none';
        }
    }

    window.addEventListener('resize', () => {
        camera.aspect = (window.innerWidth - 350) / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
    });

    init();
</script>
</body>
</html>
